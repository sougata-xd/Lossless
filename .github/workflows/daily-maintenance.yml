name: Daily Maintenance

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight UTC
  workflow_dispatch: 

permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update Out-of-date PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRS=$(gh pr list --state open --json number --jq '.[].number')
          for PR in $PRS; do
            echo "Attempting to update PR #$PR with latest main branch..."
            gh pr update-branch $PR || echo "Failed to update PR #$PR"
          done

      - name: Stale PR and Issue Cleanup
        uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue is stale because it has been open for 30 days with no activity.'
          stale-pr-message: 'This PR is stale because it has been open for 30 days with no activity.'
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'

name: Validate JSON

on:
  pull_request:
    paths:
      - 'music.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate music.json syntax
        run: |
          if ! jq empty music.json; then
            echo "::error file=music.json::Syntax Error: Invalid JSON format in music.json! Please fix missing commas, quotes, or brackets."
            exit 1
          else
            echo "Success! music.json is perfectly valid."
          fi
